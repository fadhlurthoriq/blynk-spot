<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Watering</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <!-- STATUS BAR -->
  <header>
    <div class="brand">
      <span class="brand-icon">🌿</span>
      <span class="brand-name">Smart Watering</span>
    </div>
    <div class="status-pill" id="statusPill">
      <span class="dot"></span>
      <span id="statusText">Menghubungkan...</span>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main id="mainContent">

    <!-- ROW 1: 3 metric cards -->
    <section class="grid-3">

      <div class="card card-metric">
        <div class="card-label">Suhu Sekitar</div>
        <div class="card-value" id="valTemp">—</div>
        <div class="card-unit">°C</div>
        <div class="bar-track">
          <div class="bar-fill bar-temp" id="barTemp" style="width:0%"></div>
        </div>
      </div>

      <div class="card card-metric">
        <div class="card-label">Kelembapan Udara</div>
        <div class="card-value" id="valHumid">—</div>
        <div class="card-unit">%</div>
        <div class="bar-track">
          <div class="bar-fill bar-humid" id="barHumid" style="width:0%"></div>
        </div>
      </div>

      <div class="card card-metric">
        <div class="card-label">Kelembapan Tanah</div>
        <div class="card-value" id="valSoil">—</div>
        <div class="card-unit">%</div>
        <div class="bar-track">
          <div class="bar-fill bar-soil" id="barSoil" style="width:0%"></div>
        </div>
      </div>

    </section>

    <!-- ROW 2: Tank gauge + Controls -->
    <section class="grid-2">

      <!-- Tank -->
      <div class="card card-tank">
        <div class="card-label">Kapasitas Air</div>
        <div class="gauge-wrap">
          <svg class="gauge-svg" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
            <!-- track arc -->
            <path class="gauge-track" d="M10,70 A50,50 0 0,1 110,70" fill="none" stroke-width="10" stroke-linecap="round"/>
            <!-- fill arc -->
            <path class="gauge-fill" id="gaugeFill" d="M10,70 A50,50 0 0,1 110,70" fill="none" stroke-width="10" stroke-linecap="round"
              stroke-dasharray="157" stroke-dashoffset="157"/>
            <!-- center text -->
            <text class="gauge-text" id="gaugeText" x="60" y="66" text-anchor="middle">0%</text>
          </svg>
          <div class="gauge-labels"><span>0</span><span>100</span></div>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls-col">

        <!-- Mode toggle -->
        <div class="card card-mode">
          <div class="card-label">Mode Penyiraman</div>
          <div class="mode-toggle">
            <button class="mode-btn active" id="btnAuto" onclick="setMode(0)">
              <span>🔄</span> Auto
            </button>
            <button class="mode-btn" id="btnManual" onclick="setMode(1)">
              <span>✋</span> Manual
            </button>
          </div>
        </div>

        <!-- Siram manual -->
        <div class="card card-siram" id="cardSiram">
          <div class="card-label">Siram Manual</div>
          <button class="btn-siram" id="btnSiram" >
            <span id="siramIcon">💧</span>
            <span id="siramLabel">SIRAM</span>
          </button>
        </div>

      </div>
    </section>

    <!-- ROW 3: LED indicators -->
    <section class="card card-leds">
      <div class="card-label">Status Indikator</div>
      <div class="leds-row">
        <div class="led-item">
          <div class="led led-blue" id="ledBlue"></div>
          <span>Menyiram</span>
        </div>
        <div class="led-item">
          <div class="led led-green" id="ledGreen"></div>
          <span>Standby</span>
        </div>
      </div>
    </section>

  </main>

  <!-- OFFLINE OVERLAY -->
  <div class="offline-overlay" id="offlineOverlay" style="display:none">
    <div class="offline-box">
      <div class="offline-icon">📡</div>
      <div class="offline-title">Perangkat Offline</div>
      <div class="offline-sub">Mencoba terhubung kembali...</div>
      <div class="offline-spinner"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
