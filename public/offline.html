<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - Smart Watering</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f7f3;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1a2e22;
    }
    .box {
      background: #fff;
      border-radius: 20px;
      padding: 40px 28px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 320px;
      width: 100%;
    }
    .icon { font-size: 52px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
    p  { font-size: 14px; color: #5a7a66; line-height: 1.5; margin-bottom: 24px; }
    a {
      display: inline-block;
      background: #2d9e5f;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      padding: 12px 28px;
      border-radius: 10px;
      transition: background 150ms;
    }
    a:hover { background: #1a6b3a; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🌿</div>
    <h1>Kamu sedang offline</h1>
    <p>Periksa koneksi internet kamu, lalu coba lagi untuk memantau dan mengontrol perangkat Smart Watering.</p>
    <a href="/">Coba Lagi</a>
  </div>
</body>
</html>
